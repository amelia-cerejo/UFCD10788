<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Normalização de dados</title>
  <desc id="desc">Dados repetidos divididos em tabelas relacionadas.</desc>
  <rect width="1200" height="720" fill="#F8FAFC"/>
  <rect x="88" y="80" width="1024" height="560" rx="34" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3"/>
  <text x="145" y="152" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Reduzir repetição</text>
  <text x="145" y="192" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Separar dados por assunto ajuda a manter a informação coerente.</text>
  <g transform="translate(145 250)" font-family="Arial, Helvetica, sans-serif">
    <rect width="360" height="250" rx="20" fill="#FFF7ED" stroke="#FED7AA" stroke-width="3"/>
    <text x="28" y="42" fill="#F97316" font-size="22" font-weight="800">Antes</text>
    <g fill="#374151" font-size="17">
      <text x="28" y="86">Ana | UFCD 10788 | Sala 1</text>
      <text x="28" y="128">Ana | UFCD 10788 | Sala 1</text>
      <text x="28" y="170">Bruno | UFCD 10788 | Sala 2</text>
      <text x="28" y="212">Bruno | UFCD 10788 | Sala 2</text>
    </g>
  </g>
  <path d="M540 374H650" stroke="#3B6FD8" stroke-width="9" stroke-linecap="round"/>
  <path d="M625 348L658 374L625 400" fill="none" stroke="#3B6FD8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(695 238)" font-family="Arial, Helvetica, sans-serif">
    <rect width="350" height="130" rx="20" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <text x="24" y="42" fill="#1E3A8A" font-size="21" font-weight="800">Formandos</text>
    <text x="24" y="82" fill="#374151" font-size="17">ID | Nome | Sala</text>
    <text x="24" y="108" fill="#374151" font-size="17">1 | Ana | 1</text>
    <rect y="160" width="350" height="130" rx="20" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <text x="24" y="202" fill="#1E3A8A" font-size="21" font-weight="800">Cursos</text>
    <text x="24" y="242" fill="#374151" font-size="17">ID | Nome</text>
    <text x="24" y="268" fill="#374151" font-size="17">10788 | Fundamentos SQL</text>
  </g>
  <text x="145" y="575" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Menos repetição. Mais consistência. Atualizações mais simples.</text>
</svg>
