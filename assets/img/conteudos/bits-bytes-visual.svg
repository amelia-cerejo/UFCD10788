<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Bits agrupados em bytes e ficheiros</title>
  <desc id="desc">Ilustracao didatica que mostra bits individuais a formar bytes, e bytes a formar um ficheiro digital.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1E3A8A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="82" y="78" width="1036" height="564" rx="34" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3" filter="url(#shadow)"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="138" y="154" fill="#1E3A8A" font-size="26" font-weight="800">Do bit ao ficheiro</text>
    <text x="138" y="190" fill="#64748B" font-size="19">Um bit guarda um estado. Oito bits formam um byte. Muitos bytes formam ficheiros.</text>
  </g>

  <g transform="translate(142 260)" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="-28" fill="#1E3A8A" font-size="22" font-weight="800">Bits individuais</text>
    <g font-size="34" font-weight="800">
      <circle cx="36" cy="36" r="36" fill="#1E3A8A"/>
      <text x="36" y="48" text-anchor="middle" fill="#FFFFFF">0</text>
      <circle cx="126" cy="36" r="36" fill="#F8FAFC" stroke="#D7E3F8" stroke-width="3"/>
      <text x="126" y="48" text-anchor="middle" fill="#1E3A8A">1</text>
      <circle cx="216" cy="36" r="36" fill="#1E3A8A"/>
      <text x="216" y="48" text-anchor="middle" fill="#FFFFFF">1</text>
    </g>
    <text x="0" y="112" fill="#64748B" font-size="18">Cada bit só tem dois estados possíveis.</text>
  </g>

  <path d="M430 294 C476 294 488 294 530 294" fill="none" stroke="#F97316" stroke-width="8" stroke-linecap="round"/>
  <path d="M510 274 L538 294 L510 314" fill="none" stroke="#F97316" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(560 238)" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="-6" fill="#1E3A8A" font-size="22" font-weight="800">1 byte</text>
    <rect x="0" y="22" width="394" height="112" rx="22" fill="#F8FAFC" stroke="#D7E3F8" stroke-width="3"/>
    <g transform="translate(22 46)" font-size="25" font-weight="800">
      <rect x="0" y="0" width="36" height="42" rx="9" fill="#1E3A8A"/>
      <text x="18" y="29" text-anchor="middle" fill="#FFFFFF">0</text>
      <rect x="44" y="0" width="36" height="42" rx="9" fill="#FFFFFF" stroke="#D7E3F8"/>
      <text x="62" y="29" text-anchor="middle" fill="#1E3A8A">1</text>
      <rect x="88" y="0" width="36" height="42" rx="9" fill="#1E3A8A"/>
      <text x="106" y="29" text-anchor="middle" fill="#FFFFFF">0</text>
      <rect x="132" y="0" width="36" height="42" rx="9" fill="#FFFFFF" stroke="#D7E3F8"/>
      <text x="150" y="29" text-anchor="middle" fill="#1E3A8A">0</text>
      <rect x="176" y="0" width="36" height="42" rx="9" fill="#1E3A8A"/>
      <text x="194" y="29" text-anchor="middle" fill="#FFFFFF">0</text>
      <rect x="220" y="0" width="36" height="42" rx="9" fill="#FFFFFF" stroke="#D7E3F8"/>
      <text x="238" y="29" text-anchor="middle" fill="#1E3A8A">0</text>
      <rect x="264" y="0" width="36" height="42" rx="9" fill="#FFFFFF" stroke="#D7E3F8"/>
      <text x="282" y="29" text-anchor="middle" fill="#1E3A8A">0</text>
      <rect x="308" y="0" width="36" height="42" rx="9" fill="#1E3A8A"/>
      <text x="326" y="29" text-anchor="middle" fill="#FFFFFF">1</text>
    </g>
    <text x="22" y="108" fill="#64748B" font-size="18">8 bits agrupados</text>
  </g>

  <path d="M754 408 C754 446 754 458 754 490" fill="none" stroke="#3B6FD8" stroke-width="8" stroke-linecap="round"/>
  <path d="M734 470 L754 498 L774 470" fill="none" stroke="#3B6FD8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(252 508)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="696" height="84" rx="22" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <g transform="translate(32 22)">
      <rect x="0" y="0" width="74" height="40" rx="10" fill="#1E3A8A"/>
      <text x="37" y="27" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">byte</text>
      <rect x="92" y="0" width="74" height="40" rx="10" fill="#1E3A8A" opacity="0.86"/>
      <text x="129" y="27" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">byte</text>
      <rect x="184" y="0" width="74" height="40" rx="10" fill="#1E3A8A" opacity="0.72"/>
      <text x="221" y="27" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">byte</text>
      <rect x="276" y="0" width="74" height="40" rx="10" fill="#F97316"/>
      <text x="313" y="27" text-anchor="middle" fill="#FFFFFF" font-size="18" font-weight="800">byte</text>
      <text x="384" y="27" fill="#1E3A8A" font-size="22" font-weight="800">ficheiro digital</text>
      <text x="542" y="27" fill="#64748B" font-size="18">texto, imagem, som...</text>
    </g>
  </g>

  <g transform="translate(150 606)" font-family="Arial, Helvetica, sans-serif">
    <text x="0" y="0" fill="#1E3A8A" font-size="18" font-weight="800">1 bit</text>
    <text x="58" y="0" fill="#64748B" font-size="18">dois estados</text>
    <text x="236" y="0" fill="#1E3A8A" font-size="18" font-weight="800">1 byte</text>
    <text x="310" y="0" fill="#64748B" font-size="18">oito bits</text>
    <text x="462" y="0" fill="#1E3A8A" font-size="18" font-weight="800">ficheiro</text>
    <text x="548" y="0" fill="#64748B" font-size="18">muitos bytes organizados</text>
  </g>
</svg>
