<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Representacao visual do sistema binario</title>
  <desc id="desc">Ilustracao com bits zero e um, uma barra de valores e ligacoes simples a um computador.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#EFF6FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#3B6FD8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1E3A8A" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="88" y="86" width="1024" height="548" rx="34" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3" filter="url(#shadow)"/>
  <g transform="translate(152 194)">
    <rect x="0" y="0" width="86" height="86" rx="18" fill="#1E3A8A"/>
    <text x="43" y="58" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">1</text>
    <rect x="106" y="0" width="86" height="86" rx="18" fill="#F8FAFC" stroke="#D7E3F8" stroke-width="3"/>
    <text x="149" y="58" text-anchor="middle" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">0</text>
    <rect x="212" y="0" width="86" height="86" rx="18" fill="#1E3A8A"/>
    <text x="255" y="58" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">1</text>
    <rect x="318" y="0" width="86" height="86" rx="18" fill="#1E3A8A"/>
    <text x="361" y="58" text-anchor="middle" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="800">1</text>

    <text x="0" y="134" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700">1011</text>
    <text x="78" y="134" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="22">= 8 + 2 + 1</text>
    <text x="0" y="176" fill="#F97316" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800">11 em decimal</text>
  </g>

  <g transform="translate(680 152)">
    <rect x="0" y="0" width="314" height="226" rx="24" fill="#F8FAFC" stroke="#D7E3F8" stroke-width="3"/>
    <rect x="44" y="48" width="226" height="126" rx="16" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3"/>
    <rect x="74" y="76" width="166" height="12" rx="6" fill="#3B6FD8" opacity="0.55"/>
    <rect x="74" y="106" width="118" height="12" rx="6" fill="#F97316" opacity="0.75"/>
    <rect x="74" y="136" width="150" height="12" rx="6" fill="#1E3A8A" opacity="0.45"/>
    <rect x="108" y="188" width="98" height="16" rx="8" fill="#1E3A8A"/>
    <circle cx="279" cy="36" r="15" fill="#16A34A"/>
    <circle cx="279" cy="190" r="15" fill="#F97316"/>
  </g>

  <g transform="translate(152 500)">
    <text x="0" y="-20" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">Valores das posicoes</text>
    <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">
      <rect x="0" y="0" width="92" height="54" rx="12" fill="#EFF6FF" stroke="#D7E3F8"/>
      <text x="46" y="35" text-anchor="middle" fill="#1E3A8A">8</text>
      <rect x="104" y="0" width="92" height="54" rx="12" fill="#EFF6FF" stroke="#D7E3F8"/>
      <text x="150" y="35" text-anchor="middle" fill="#1E3A8A">4</text>
      <rect x="208" y="0" width="92" height="54" rx="12" fill="#EFF6FF" stroke="#D7E3F8"/>
      <text x="254" y="35" text-anchor="middle" fill="#1E3A8A">2</text>
      <rect x="312" y="0" width="92" height="54" rx="12" fill="#EFF6FF" stroke="#D7E3F8"/>
      <text x="358" y="35" text-anchor="middle" fill="#1E3A8A">1</text>
    </g>
  </g>
</svg>
