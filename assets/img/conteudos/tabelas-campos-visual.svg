<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Tabela com campos e registos</title>
  <desc id="desc">Tabela didatica com colunas como campos e linhas como registos.</desc>
  <rect width="1200" height="720" fill="#F8FAFC"/>
  <rect x="90" y="80" width="1020" height="560" rx="34" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3"/>
  <text x="145" y="155" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">Tabela = campos + registos</text>
  <text x="145" y="195" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Campos são colunas. Registos são linhas.</text>
  <g transform="translate(145 255)" font-family="Arial, Helvetica, sans-serif">
    <rect width="910" height="250" rx="18" fill="#F8FAFC" stroke="#D7E3F8" stroke-width="3"/>
    <g font-size="19" font-weight="800">
      <rect x="0" y="0" width="910" height="58" rx="18" fill="#1E3A8A"/>
      <text x="60" y="37" fill="#FFFFFF">ID</text><text x="205" y="37" fill="#FFFFFF">Nome</text><text x="430" y="37" fill="#FFFFFF">Email</text><text x="705" y="37" fill="#FFFFFF">Estado</text>
    </g>
    <g fill="#374151" font-size="18">
      <text x="60" y="104">1</text><text x="205" y="104">Ana</text><text x="430" y="104">ana@email.pt</text><text x="705" y="104">Ativo</text>
      <text x="60" y="158">2</text><text x="205" y="158">Bruno</text><text x="430" y="158">bruno@email.pt</text><text x="705" y="158">Ativo</text>
      <text x="60" y="212">3</text><text x="205" y="212">Carla</text><text x="430" y="212">carla@email.pt</text><text x="705" y="212">Inativo</text>
    </g>
    <g stroke="#D7E3F8" stroke-width="2">
      <path d="M0 116H910M0 170H910M150 0V250M375 0V250M650 0V250"/>
    </g>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">
    <rect x="160" y="548" width="220" height="58" rx="14" fill="#EFF6FF" stroke="#D7E3F8"/>
    <text x="270" y="584" text-anchor="middle" fill="#1E3A8A">Campo</text>
    <rect x="410" y="548" width="220" height="58" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="520" y="584" text-anchor="middle" fill="#F97316">Registo</text>
    <rect x="660" y="548" width="260" height="58" rx="14" fill="#EFF6FF" stroke="#D7E3F8"/>
    <text x="790" y="584" text-anchor="middle" fill="#1E3A8A">Dados organizados</text>
  </g>
</svg>
