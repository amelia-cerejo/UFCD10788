<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Linguagens C e C++</title>
  <desc id="desc">Comparação visual entre C e C++ com código, funções e objetos.</desc>
  <rect width="1200" height="720" fill="#F8FAFC"/>
  <rect x="86" y="78" width="1028" height="564" rx="34" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3"/>
  <text x="145" y="152" fill="#1E3A8A" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="800">C e C++</text>
  <text x="145" y="192" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Duas linguagens fundamentais para compreender programação e sistemas.</text>
  <g transform="translate(145 250)" font-family="Arial, Helvetica, sans-serif">
    <rect width="410" height="250" rx="22" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <text x="30" y="48" fill="#1E3A8A" font-size="34" font-weight="800">C</text>
    <text x="30" y="88" fill="#64748B" font-size="18">Estruturas, funções e memória</text>
    <rect x="30" y="122" width="310" height="16" rx="8" fill="#1E3A8A"/>
    <rect x="30" y="156" width="240" height="16" rx="8" fill="#3B6FD8"/>
    <rect x="30" y="190" width="280" height="16" rx="8" fill="#F97316"/>
    <rect x="510" y="0" width="410" height="250" rx="22" fill="#FFF7ED" stroke="#FED7AA" stroke-width="3"/>
    <text x="540" y="48" fill="#F97316" font-size="34" font-weight="800">C++</text>
    <text x="540" y="88" fill="#64748B" font-size="18">C + classes, objetos e abstração</text>
    <rect x="540" y="122" width="118" height="74" rx="14" fill="#FFFFFF" stroke="#FED7AA"/>
    <text x="599" y="166" text-anchor="middle" fill="#F97316" font-size="18" font-weight="800">classe</text>
    <rect x="684" y="122" width="118" height="74" rx="14" fill="#FFFFFF" stroke="#FED7AA"/>
    <text x="743" y="166" text-anchor="middle" fill="#F97316" font-size="18" font-weight="800">objeto</text>
  </g>
  <g transform="translate(235 552)" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800">
    <rect width="730" height="58" rx="16" fill="#EFF6FF" stroke="#D7E3F8"/>
    <text x="365" y="37" text-anchor="middle" fill="#1E3A8A">Variáveis · tipos de dados · decisões · repetições · funções</text>
  </g>
</svg>
