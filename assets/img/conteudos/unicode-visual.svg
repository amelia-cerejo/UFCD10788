<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Unicode e caracteres de várias línguas</title>
  <desc id="desc">Ilustração com caracteres acentuados, símbolos e diferentes sistemas de escrita ligados a códigos Unicode.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#EFF6FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#1E3A8A" flood-opacity="0.14"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect x="82" y="76" width="1036" height="568" rx="34" fill="#FFFFFF" stroke="#D7E3F8" stroke-width="3" filter="url(#shadow)"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="140" y="150" fill="#1E3A8A" font-size="28" font-weight="800">Um padrão para muitos caracteres</text>
    <text x="140" y="188" fill="#64748B" font-size="20">Unicode ajuda sistemas diferentes a interpretar letras, acentos e símbolos da mesma forma.</text>
  </g>
  <g transform="translate(152 250)" font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <rect x="0" y="0" width="130" height="106" rx="20" fill="#1E3A8A"/>
    <text x="65" y="70" text-anchor="middle" fill="#FFFFFF" font-size="46">ç</text>
    <rect x="156" y="0" width="130" height="106" rx="20" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <text x="221" y="70" text-anchor="middle" fill="#1E3A8A" font-size="46">á</text>
    <rect x="312" y="0" width="130" height="106" rx="20" fill="#1E3A8A"/>
    <text x="377" y="70" text-anchor="middle" fill="#FFFFFF" font-size="46">€</text>
    <rect x="468" y="0" width="130" height="106" rx="20" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <text x="533" y="70" text-anchor="middle" fill="#1E3A8A" font-size="46">Ω</text>
    <rect x="624" y="0" width="130" height="106" rx="20" fill="#1E3A8A"/>
    <text x="689" y="70" text-anchor="middle" fill="#FFFFFF" font-size="46">中</text>
    <rect x="780" y="0" width="130" height="106" rx="20" fill="#EFF6FF" stroke="#D7E3F8" stroke-width="3"/>
    <text x="845" y="70" text-anchor="middle" fill="#1E3A8A" font-size="46">ñ</text>
  </g>
  <g transform="translate(210 424)" font-family="Arial, Helvetica, sans-serif">
    <rect x="0" y="0" width="780" height="102" rx="24" fill="#F8FAFC" stroke="#D7E3F8" stroke-width="3"/>
    <text x="36" y="42" fill="#1E3A8A" font-size="22" font-weight="800">carácter</text>
    <text x="190" y="42" fill="#64748B" font-size="22">→</text>
    <text x="244" y="42" fill="#1E3A8A" font-size="22" font-weight="800">código Unicode</text>
    <text x="488" y="42" fill="#64748B" font-size="22">→</text>
    <text x="542" y="42" fill="#1E3A8A" font-size="22" font-weight="800">bytes em UTF-8</text>
    <rect x="36" y="62" width="120" height="10" rx="5" fill="#F97316"/>
    <rect x="244" y="62" width="190" height="10" rx="5" fill="#3B6FD8"/>
    <rect x="542" y="62" width="164" height="10" rx="5" fill="#1E3A8A"/>
  </g>
  <text x="140" y="594" fill="#64748B" font-family="Arial, Helvetica, sans-serif" font-size="20">Exemplo: sem a codificação certa, acentos e símbolos podem aparecer trocados.</text>
</svg>
