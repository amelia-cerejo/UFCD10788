<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1180" viewBox="0 0 1200 1180">
  <defs>
    <linearGradient id="bar" x1="0" x2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="0.5" stop-color="#3B6FD8"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#3B6FD8" stop-opacity="0.72"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1E3A8A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="1180" fill="#F8FAFC"/>
  <text x="90" y="68" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="800" fill="#1E3A8A">Pre-visualizacao dos blocos Moodle</text>
  <text x="90" y="98" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#64748B">Maquete estatica para validar a identidade visual antes de abrir no browser.</text>

  <g filter="url(#shadow)">
    <rect x="90" y="135" width="1020" height="150" rx="8" fill="#1E3A8A"/>
    <text x="120" y="182" font-family="Arial" font-size="14" font-weight="800" fill="#F59E0B">UFCD 10788</text>
    <text x="120" y="222" font-family="Arial" font-size="30" font-weight="800" fill="#FFFFFF">Conceitos fundamentais de programacao</text>
    <rect x="90" y="278" width="1020" height="7" fill="url(#bar)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="305" width="1020" height="210" rx="8" fill="#FFFFFF" stroke="#D7E3F8"/>
    <rect x="115" y="330" width="970" height="160" rx="8" fill="#F8FAFC" stroke="#D7E3F8" stroke-dasharray="8 8"/>
    <text x="600" y="410" text-anchor="middle" font-family="Arial" font-size="24" font-weight="800" fill="#1E3A8A">Padlet incorporado</text>
    <text x="600" y="440" text-anchor="middle" font-family="Arial" font-size="15" fill="#64748B">O conteudo real carrega dentro do Moodle/browser.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="560" width="1020" height="170" rx="8" fill="#1E3A8A"/>
    <rect x="90" y="560" width="1020" height="170" rx="8" fill="url(#blue)"/>
    <text x="122" y="625" font-family="Arial" font-size="13" font-weight="800" fill="#F59E0B">PAGINA DE APOIO</text>
    <text x="122" y="668" font-family="Arial" font-size="31" font-weight="900" fill="#FFFFFF">Conteudos, atividades, avaliacao e recursos</text>
    <rect x="90" y="723" width="1020" height="7" fill="url(#bar)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="775" width="1020" height="190" rx="8" fill="#1E3A8A"/>
    <rect x="90" y="775" width="1020" height="190" rx="8" fill="url(#blue)"/>
    <text x="122" y="835" font-family="Arial" font-size="13" font-weight="800" fill="#F59E0B">ATIVIDADE DIARIA</text>
    <text x="122" y="878" font-family="Arial" font-size="31" font-weight="900" fill="#FFFFFF">Glossario colaborativo de programacao</text>
    <text x="122" y="910" font-family="Arial" font-size="16" fill="#EAF2FF">Todos os dias acrescentamos novos termos, definicoes e exemplos.</text>
    <rect x="960" y="825" width="90" height="90" rx="8" fill="#FFFFFF" fill-opacity="0.12" stroke="#FFFFFF" stroke-opacity="0.28"/>
    <text x="1005" y="883" text-anchor="middle" font-family="Arial" font-size="42" font-weight="900" fill="#FACC15">Aa</text>
    <rect x="90" y="958" width="1020" height="7" fill="url(#bar)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="982" width="1020" height="120" rx="8" fill="#FFFFFF" stroke="#D7E3F8"/>
    <text x="122" y="1023" font-family="Arial" font-size="16" fill="#374151">Nesta atividade vamos construir, diariamente, um glossario colaborativo da UFCD 10788.</text>
    <circle cx="132" cy="1054" r="3" fill="#374151"/>
    <text x="148" y="1060" font-family="Arial" font-size="14" fill="#374151">Escolhe um termo relacionado com a sessao do dia.</text>
    <circle cx="132" cy="1080" r="3" fill="#374151"/>
    <text x="148" y="1086" font-family="Arial" font-size="14" fill="#374151">Explica o significado por palavras tuas e acrescenta um exemplo.</text>
  </g>
</svg>
